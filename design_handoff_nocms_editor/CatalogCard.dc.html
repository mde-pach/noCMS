<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ cardStyle }}">
  <!-- preview -->
  <div style="position:relative;height:132px;background:#FBFAF7;border-bottom:1px solid #EFEDE7;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:16px;">

    <sc-if value="{{ isHero }}" hint-placeholder-val="{{ true }}">
      <div style="text-align:center;width:100%;">
        <div style="width:38px;height:4px;border-radius:2px;background:#D9B7A6;margin:0 auto 8px;"></div>
        <div style="font-family:Lora,serif;font-size:17px;font-weight:600;letter-spacing:-0.01em;line-height:1.1;color:#2A2824;">Build something<br>you own.</div>
        <div style="display:flex;gap:5px;justify-content:center;margin-top:9px;"><span style="width:30px;height:9px;border-radius:3px;border:1px solid #D5D1C8;"></span><span style="width:34px;height:9px;border-radius:3px;background:#B0542F;"></span></div>
      </div>
    </sc-if>
    <sc-if value="{{ isCta }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center;width:90%;background:#1A1916;border-radius:8px;padding:16px 12px;">
        <div style="font-family:Lora,serif;font-size:14px;color:#fff;line-height:1.15;">Ready to ship?</div>
        <div style="width:46px;height:9px;border-radius:3px;background:#B0542F;margin:8px auto 0;"></div>
      </div>
    </sc-if>
    <sc-if value="{{ isFeatures }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;gap:8px;width:100%;">
        <sc-for list="{{ three }}" as="n" hint-placeholder-count="3"><div style="flex:1;background:#fff;border:1px solid #EFEDE7;border-radius:6px;padding:9px;"><div style="width:13px;height:13px;border-radius:4px;background:#EEE7DF;margin-bottom:7px;"></div><div style="width:80%;height:4px;border-radius:2px;background:#D9D4CB;margin-bottom:4px;"></div><div style="width:60%;height:4px;border-radius:2px;background:#E5E0D7;"></div></div></sc-for>
      </div>
    </sc-if>
    <sc-if value="{{ isLogos }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;gap:12px;align-items:center;justify-content:center;width:100%;opacity:0.6;"><sc-for list="{{ five }}" as="n" hint-placeholder-count="5"><div style="width:34px;height:11px;border-radius:3px;background:#CFC9BF;"></div></sc-for></div>
    </sc-if>
    <sc-if value="{{ isTestimonial }}" hint-placeholder-val="{{ false }}">
      <div style="width:100%;text-align:center;"><div style="font-family:Lora,serif;font-size:30px;color:#D9B7A6;line-height:0.6;">“</div><div style="font-family:Lora,serif;font-size:13px;font-style:italic;color:#3A3833;line-height:1.3;margin-top:2px;">It just feels like<br>my own site.</div><div style="width:54px;height:4px;border-radius:2px;background:#D9D4CB;margin:9px auto 0;"></div></div>
    </sc-if>
    <sc-if value="{{ isPricing }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;gap:8px;width:100%;align-items:flex-end;"><div style="flex:1;background:#fff;border:1px solid #EFEDE7;border-radius:6px;padding:8px;height:74px;"><div style="width:60%;height:4px;background:#D9D4CB;border-radius:2px;margin-bottom:6px;"></div><div style="font-family:Lora,serif;font-size:13px;color:#2A2824;">$0</div></div><div style="flex:1;background:#fff;border:1.5px solid #3D5A98;border-radius:6px;padding:8px;height:90px;"><div style="width:60%;height:4px;background:#3D5A98;border-radius:2px;margin-bottom:6px;"></div><div style="font-family:Lora,serif;font-size:13px;color:#2A2824;">Pro</div></div><div style="flex:1;background:#fff;border:1px solid #EFEDE7;border-radius:6px;padding:8px;height:74px;"><div style="width:60%;height:4px;background:#D9D4CB;border-radius:2px;margin-bottom:6px;"></div></div></div>
    </sc-if>
    <sc-if value="{{ isFaq }}" hint-placeholder-val="{{ false }}">
      <div style="width:100%;display:flex;flex-direction:column;gap:6px;"><sc-for list="{{ three }}" as="n" hint-placeholder-count="3"><div style="display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #EFEDE7;border-radius:6px;padding:7px 9px;"><div style="width:60%;height:4px;border-radius:2px;background:#D9D4CB;"></div><div style="width:7px;height:7px;border-right:1.5px solid #C0BBB1;border-bottom:1.5px solid #C0BBB1;transform:rotate(45deg);"></div></div></sc-for></div>
    </sc-if>
    <sc-if value="{{ isContact }}" hint-placeholder-val="{{ false }}">
      <div style="width:78%;display:flex;flex-direction:column;gap:7px;"><div style="height:13px;border:1px solid #E0DDD6;border-radius:5px;background:#fff;"></div><div style="height:13px;border:1px solid #E0DDD6;border-radius:5px;background:#fff;"></div><div style="height:24px;border:1px solid #E0DDD6;border-radius:5px;background:#fff;"></div><div style="width:50px;height:13px;border-radius:5px;background:#B0542F;align-self:flex-end;"></div></div>
    </sc-if>
    <sc-if value="{{ isFooter }}" hint-placeholder-val="{{ false }}">
      <div style="width:100%;"><div style="display:flex;gap:14px;margin-bottom:9px;"><sc-for list="{{ three }}" as="n" hint-placeholder-count="3"><div style="flex:1;"><div style="width:50%;height:4px;background:#CFC9BF;border-radius:2px;margin-bottom:6px;"></div><div style="width:80%;height:3px;background:#E0DBD2;border-radius:2px;margin-bottom:4px;"></div><div style="width:65%;height:3px;background:#E0DBD2;border-radius:2px;"></div></div></sc-for></div><div style="height:1px;background:#E5E0D7;margin-bottom:6px;"></div><div style="width:40%;height:3px;background:#E0DBD2;border-radius:2px;"></div></div>
    </sc-if>

    <sc-if value="{{ hover }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;inset:0;background:rgba(26,25,22,0.06);display:flex;align-items:center;justify-content:center;">
        <span style="display:flex;align-items:center;gap:6px;background:#3D5A98;color:#fff;font-size:12.5px;font-weight:600;padding:8px 16px;border-radius:999px;box-shadow:0 6px 18px rgba(61,90,152,0.35);">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="1.7"><path d="M6 2.5v7M2.5 6h7"/></svg> Insert
        </span>
      </div>
    </sc-if>
  </div>

  <!-- footer -->
  <div style="padding:12px 14px 14px;">
    <div style="display:flex;align-items:center;gap:9px;">
      <div style="width:24px;height:24px;border-radius:7px;background:#F4F2ED;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <sc-if value="{{ isHero }}" hint-placeholder-val="{{ true }}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#6B6760" stroke-width="1.3"><path d="M2.5 4h8M4 6.5h5M3 9h7"/></svg></sc-if>
        <sc-if value="{{ isCta }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#6B6760" stroke-width="1.3"><rect x="2" y="4" width="9" height="5" rx="1.5"/></svg></sc-if>
        <sc-if value="{{ isFeatures }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#6B6760" stroke-width="1.3"><path d="M3 3v7M6.5 3v7M10 3v7"/></svg></sc-if>
        <sc-if value="{{ isLogos }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#6B6760" stroke-width="1.3"><circle cx="3.3" cy="6.5" r="1.1"/><circle cx="6.5" cy="6.5" r="1.1"/><circle cx="9.7" cy="6.5" r="1.1"/></svg></sc-if>
        <sc-if value="{{ isTestimonial }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#6B6760" stroke-width="1.3"><path d="M2.5 4.5h8v4H6l-2 2V8.5H2.5z"/></svg></sc-if>
        <sc-if value="{{ isPricing }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#6B6760" stroke-width="1.3"><rect x="2" y="3" width="9" height="7" rx="1"/><path d="M5 3.2v6.6M8 3.2v6.6"/></svg></sc-if>
        <sc-if value="{{ isFaq }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#6B6760" stroke-width="1.3"><rect x="2" y="3" width="9" height="2.6" rx="0.8"/><rect x="2" y="7" width="9" height="2.6" rx="0.8"/></svg></sc-if>
        <sc-if value="{{ isContact }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#6B6760" stroke-width="1.3"><path d="M2.5 4h8M2.5 6.5h8M2.5 9h4"/></svg></sc-if>
        <sc-if value="{{ isFooter }}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#6B6760" stroke-width="1.3"><path d="M2.5 4h3M7 4h3.5M2.5 6.5h2M2.5 9h8"/></svg></sc-if>
      </div>
      <div style="font-size:13.5px;font-weight:600;flex:1;">{{ name }}</div>
      <span style="{{ badgeStyle }}">{{ badge }}</span>
    </div>
    <div style="font-size:12px;color:#6B6760;line-height:1.45;margin-top:7px;">{{ desc }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:260,&quot;height&quot;:230},&quot;kind&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;hero&quot;,&quot;cta&quot;,&quot;features&quot;,&quot;logos&quot;,&quot;testimonial&quot;,&quot;pricing&quot;,&quot;faq&quot;,&quot;contact&quot;,&quot;footer&quot;],&quot;default&quot;:&quot;hero&quot;},&quot;name&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Hero&quot;},&quot;desc&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;A bold opening with headline, subtext, and actions.&quot;},&quot;badge&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Core&quot;},&quot;hover&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const kind = p.kind || 'hero';
    const hover = !!p.hover;
    const badge = p.badge || 'Core';
    const isCore = badge.toLowerCase() === 'core';
    return {
      name: p.cardname || p.name || 'Section',
      desc: p.desc || '',
      badge,
      hover,
      three: [0,1,2], five: [0,1,2,3,4],
      cardStyle:
        'background:#FFFFFF;border:1px solid #E0DDD6;border-radius:10px;overflow:hidden;cursor:default;transition:all .15s;' +
        (hover ? 'transform:translateY(-3px);box-shadow:0 12px 28px rgba(26,25,22,0.12);border-color:#D5D1C8;' : 'box-shadow:0 1px 2px rgba(26,25,22,0.04);'),
      glyphStyle: 'width:11px;height:11px;border:1.4px solid #6B6760;border-radius:3px;',
      badgeStyle: 'font-family:\'IBM Plex Mono\',monospace;font-size:9.5px;letter-spacing:0.04em;padding:2px 7px;border-radius:5px;' +
        (isCore ? 'background:#F1EFE9;color:#8A8579;' : 'background:#EEF1F7;color:#3D5A98;'),
      isHero: kind==='hero', isCta: kind==='cta', isFeatures: kind==='features',
      isLogos: kind==='logos', isTestimonial: kind==='testimonial', isPricing: kind==='pricing',
      isFaq: kind==='faq', isContact: kind==='contact', isFooter: kind==='footer',
    };
  }
}
</script>
</body>
</html>
